<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Test Messenger</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1d2130;
    --border: #2a2f3f;
    --text: #e8eaf0;
    --muted: #8890a3;
    --accent: #5fb3ff;
    --accent-2: #3ddc97;
    --danger: #ff6b6b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 15px;
    margin: 0;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .status {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .status.on { color: var(--accent-2); border-color: var(--accent-2); }
  .status.off { color: var(--danger); border-color: var(--danger); }

  .setup {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .setup.hidden { display: none; }
  .setup label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, button {
    font-family: inherit;
    font-size: 13px;
  }
  input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    color: var(--text);
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  .setup-row { display: flex; flex-direction: column; gap: 4px; }
  .connect-btn {
    margin-top: 6px;
    background: var(--accent);
    color: #0a0d12;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-weight: 600;
    cursor: pointer;
  }
  .connect-btn:hover { filter: brightness(1.08); }
  .err {
    font-size: 12px;
    color: var(--danger);
    min-height: 14px;
  }

  .chat { display: flex; flex-direction: column; height: 420px; }
  .chat.hidden { display: none; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .empty {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    margin-top: 40px;
  }
  .msg {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
  }
  .msg .meta {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    display: flex;
    gap: 8px;
  }
  .msg .name { color: var(--accent); font-weight: 600; }

  .composer {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }
  .composer input { flex: 1; }
  .composer button {
    background: var(--accent-2);
    color: #0a0d12;
    border: none;
    border-radius: 6px;
    padding: 0 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .composer button:hover { filter: brightness(1.08); }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer-note {
    padding: 10px 20px;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>supabase test messenger</h1>
    <span class="status off" id="status">не подключено</span>
  </div>

  <div class="setup" id="setup">
    <div class="setup-row">
      <label>Project URL</label>
      <input id="url" placeholder="https://xxxxx.supabase.co" autocomplete="off">
    </div>
    <div class="setup-row">
      <label>Anon public key</label>
      <input id="key" placeholder="eyJhbGciOi..." autocomplete="off">
    </div>
    <div class="setup-row">
      <label>Твоё имя</label>
      <input id="username" placeholder="tester" autocomplete="off">
    </div>
    <button class="connect-btn" id="connectBtn">Подключиться</button>
    <div class="err" id="err"></div>
  </div>

  <div class="chat hidden" id="chat">
    <div class="messages" id="messages">
      <div class="empty">Пока нет сообщений</div>
    </div>
    <div class="composer">
      <input id="input" placeholder="Написать сообщение..." autocomplete="off">
      <button id="sendBtn">Отправить</button>
    </div>
  </div>

  <div class="footer-note">Таблица: <b>messages</b> (id, username, content, created_at). Ключи используются только в этой вкладке и никуда не сохраняются.</div>
</div>

<script>
let supabase = null;
let username = 'tester';

const statusEl = document.getElementById('status');
const setupEl = document.getElementById('setup');
const chatEl = document.getElementById('chat');
const errEl = document.getElementById('err');
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status ' + cls;
}

function renderMessage(m) {
  const empty = messagesEl.querySelector('.empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg';
  const time = new Date(m.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  div.innerHTML = `<div class="meta"><span class="name"></span><span></span></div><div class="body"></div>`;
  div.querySelector('.name').textContent = m.username;
  div.querySelector('.meta span:last-child').textContent = time;
  div.querySelector('.body').textContent = m.content;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function loadMessages() {
  const { data, error } = await supabase
    .from('messages')
    .select('*')
    .order('created_at', { ascending: true })
    .limit(100);
  if (error) {
    errEl.textContent = 'Ошибка загрузки: ' + error.message;
    return;
  }
  messagesEl.innerHTML = '';
  if (!data.length) {
    messagesEl.innerHTML = '<div class="empty">Пока нет сообщений</div>';
    return;
  }
  data.forEach(renderMessage);
}

async function sendMessage() {
  const content = inputEl.value.trim();
  if (!content) return;
  sendBtn.disabled = true;
  const { error } = await supabase.from('messages').insert({ username, content });
  sendBtn.disabled = false;
  if (error) {
    errEl.textContent = 'Ошибка отправки: ' + error.message;
    return;
  }
  inputEl.value = '';
}

async function connect() {
  errEl.textContent = '';
  const url = document.getElementById('url').value.trim();
  const key = document.getElementById('key').value.trim();
  const uname = document.getElementById('username').value.trim();

  if (!url || !key) {
    errEl.textContent = 'Заполни URL и anon key';
    return;
  }
  username = uname || 'tester';

  if (!window.supabase || !window.supabase.createClient) {
    errEl.textContent = 'Библиотека Supabase не загрузилась. Проверь интернет-соединение и перезагрузи страницу (Ctrl+Shift+R).';
    setStatus('ошибка', 'off');
    return;
  }

  try {
    supabase = window.supabase.createClient(url, key);
    // Проверочный запрос
    const { error } = await supabase.from('messages').select('id').limit(1);
    if (error) throw error;
  } catch (e) {
    errEl.textContent = 'Не удалось подключиться: ' + (e.message || e);
    setStatus('ошибка', 'off');
    return;
  }

  setStatus('подключено', 'on');
  setupEl.classList.add('hidden');
  chatEl.classList.remove('hidden');

  await loadMessages();

  supabase
    .channel('messages-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
      renderMessage(payload.new);
    })
    .subscribe();
}

document.getElementById('connectBtn').addEventListener('click', connect);
sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
